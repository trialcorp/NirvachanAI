# SonarQube / SonarCloud configuration for static analysis
sonar.projectKey=election-saathi-india
sonar.projectName=NirvachanAI
sonar.projectVersion=1.0.0

# Source paths
sonar.sources=src
sonar.tests=tests

# Exclude vendor and build artifacts
sonar.exclusions=dist/**,node_modules/**,tests/**,coverage/**,**/*.test.ts,**/*.spec.ts

# TypeScript and JavaScript configuration
sonar.typescript.tsconfigPath=tsconfig.json
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Fail CI pipeline if quality gates drop
sonar.qualitygate.wait=true
